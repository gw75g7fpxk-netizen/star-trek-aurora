name: PR Preview Deployment

on:
  push:
    branches-ignore:
      - main
      - gh-pages

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Find open PR for this branch
        id: find_pr
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            if (prs.length === 0) {
              console.log(`No open PR for branch ${branch}, skipping preview`);
              return '';
            }
            console.log(`Found PR #${prs[0].number}`);
            return String(prs[0].number);

      - name: Echo test (no Pages deploy)
        if: steps.find_pr.outputs.result != ''
        run: echo "Would deploy preview for PR ${{ steps.find_pr.outputs.result }}"
