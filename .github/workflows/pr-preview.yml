name: PR Preview Trigger

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-trigger-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  save-pr-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Save PR metadata for deploy workflow
        run: |
          mkdir -p pr-metadata
          echo "${{ github.event.pull_request.number }}" > pr-metadata/pr_number.txt
          echo "${{ github.event.pull_request.head.sha }}" > pr-metadata/pr_sha.txt
          echo "${{ github.event.action }}" > pr-metadata/pr_action.txt

      - name: Upload PR metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-metadata
          path: pr-metadata/
          retention-days: 1
