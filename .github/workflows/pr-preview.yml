name: PR Preview

on:
  # pull_request_target runs in the base-branch context so it is never gated by
  # GitHub's bot-approval (action_required) check. This is safe here because the
  # workflow only copies static files from the PR branch — no build scripts or
  # user-controlled code are executed.
  pull_request_target:
    types: [opened, synchronize, reopened, closed]
  # workflow_dispatch allows the repo owner to manually trigger a preview for
  # a specific PR number without any bot-approval requirement.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy preview for'
        required: true
        type: string

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            PR_SHA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} --jq '.head.sha')
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_SHA="${{ github.event.pull_request.head.sha }}"
          fi
          echo "number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "sha=${PR_SHA}" >> $GITHUB_OUTPUT

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: staging

      - name: Checkout PR branch content
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}
          path: pr-content

      - name: Prepare preview subdirectory
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          mkdir -p staging/pr-${PR_NUMBER}
          cp -r pr-content/. staging/pr-${PR_NUMBER}/
          # Remove .git directories — GitHub Pages upload rejects them
          rm -rf staging/pr-${PR_NUMBER}/.git
          rm -rf staging/.git
          # Do not let PR content override workflow files in the preview
          rm -rf staging/pr-${PR_NUMBER}/.github

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: staging

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');
            const repo = context.repo;
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/pr-${prNumber}/`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview deployment')
            );

            const commentBody = [
              '## \uD83D\uDE80 Preview Deployment',
              '',
              'Your preview deployment is ready!',
              '',
              `**Preview URL:** ${previewUrl}`,
              '',
              'Changes will be reflected in the preview as you push new commits.',
              '',
              '---',
              '*This preview will be automatically cleaned up when the PR is merged or closed.*',
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }

  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages for cleanup
        uses: actions/configure-pages@v5

      - name: Upload main-only Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy main-only to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Comment cleanup on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: '🧹 Preview deployment has been cleaned up.',
            });
