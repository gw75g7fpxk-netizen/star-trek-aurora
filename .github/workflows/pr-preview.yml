name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: staging

      - name: Checkout PR branch content
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-content

      - name: Prepare preview subdirectory
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          mkdir -p staging/pr-${PR_NUMBER}
          cp -r pr-content/. staging/pr-${PR_NUMBER}/
          # Remove .git directories — GitHub Pages upload rejects them
          rm -rf staging/pr-${PR_NUMBER}/.git
          rm -rf staging/.git

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: staging

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ github.event.pull_request.number }};
            const repo = context.repo;
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/pr-${prNumber}/`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview deployment')
            );

            const commentBody = `## 🚀 Preview Deployment

Your preview deployment is ready!

**Preview URL:** ${previewUrl}

Changes will be reflected in the preview as you push new commits.

---
*This preview will be automatically cleaned up when the PR is merged or closed.*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }

  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages for cleanup
        uses: actions/configure-pages@v5

      - name: Upload main-only Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy main-only to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Comment cleanup on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: '🧹 Preview deployment has been cleaned up.',
            });
