name: PR Preview Deployment

on:
  workflow_run:
    workflows: ["PR Preview Trigger"]
    types: [completed]

concurrency:
  group: preview-deploy-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  actions: read

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download PR metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: pr-metadata

      - name: Read PR metadata
        id: pr
        run: |
          echo "number=$(cat pr-metadata/pr_number.txt)" >> $GITHUB_OUTPUT
          echo "sha=$(cat pr-metadata/pr_sha.txt)" >> $GITHUB_OUTPUT
          echo "action=$(cat pr-metadata/pr_action.txt)" >> $GITHUB_OUTPUT

      - name: Checkout main branch (non-close events)
        if: steps.pr.outputs.action != 'closed'
        uses: actions/checkout@v4
        with:
          ref: main
          path: staging

      - name: Checkout PR branch content
        if: steps.pr.outputs.action != 'closed'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}
          path: pr-content

      - name: Prepare preview subdirectory
        if: steps.pr.outputs.action != 'closed'
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          mkdir -p staging/pr-${PR_NUMBER}
          cp -r pr-content/. staging/pr-${PR_NUMBER}/
          rm -rf staging/pr-${PR_NUMBER}/.git
          rm -rf staging/.git

      - name: Setup Pages
        if: steps.pr.outputs.action != 'closed'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.pr.outputs.action != 'closed'
        uses: actions/upload-pages-artifact@v3
        with:
          path: staging

      - name: Deploy to GitHub Pages
        if: steps.pr.outputs.action != 'closed'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment PR with preview link
        if: steps.pr.outputs.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');
            const repo = context.repo;
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/pr-${prNumber}/`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview deployment')
            );

            const commentBody = `## 🚀 Preview Deployment

Your preview deployment is ready!

**Preview URL:** ${previewUrl}

Changes will be reflected in the preview as you push new commits.

---
*This preview will be automatically cleaned up when the PR is merged or closed.*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }

  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download PR metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: pr-metadata

      - name: Read PR metadata
        id: pr
        run: |
          echo "number=$(cat pr-metadata/pr_number.txt)" >> $GITHUB_OUTPUT
          echo "action=$(cat pr-metadata/pr_action.txt)" >> $GITHUB_OUTPUT

      - name: Checkout main branch (on close)
        if: steps.pr.outputs.action == 'closed'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages for cleanup
        if: steps.pr.outputs.action == 'closed'
        uses: actions/configure-pages@v5

      - name: Upload main-only Pages artifact
        if: steps.pr.outputs.action == 'closed'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy main-only to GitHub Pages (removes preview)
        if: steps.pr.outputs.action == 'closed'
        uses: actions/deploy-pages@v4

      - name: Comment cleanup on PR
        if: steps.pr.outputs.action == 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '🧹 Preview deployment has been cleaned up.',
            });
